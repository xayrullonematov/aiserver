map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream fastapi_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 80;
    server_name app.autotestlar.uz;

    # Preserve method and body for API POST/PUT/PATCH/DELETE during canonicalization.
    return 308 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.autotestlar.uz;

    # SSL (Certbot will generate these)
    # ssl_certificate /etc/letsencrypt/live/app.autotestlar.uz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.autotestlar.uz/privkey.pem;

    # WebSocket routes must be matched before the generic /api/ block.
    location ^~ /api/v1/ws/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_read_timeout 3600;
    }

    # All API traffic stays on FastAPI and is never handled by the web frontend.
    location ^~ /api/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # Current repo does not define a separate web frontend upstream.
    # If a web UI is deployed later, replace only this block and keep the
    # /api/ and /api/v1/ws/ blocks above unchanged.
    location / {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}
