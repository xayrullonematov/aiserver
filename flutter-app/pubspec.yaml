name: ai_server_copilot
description: A mobile-first developer tool for managing remote servers via SSH with AI assistance.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  dio: ^5.4.0
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  web_socket_channel: ^2.4.0
  flutter_lucide: ^1.8.2
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0
  json_annotation: ^4.8.1
  intl: 0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
