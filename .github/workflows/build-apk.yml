name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show commit
        run: git rev-parse HEAD

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get dependencies
        working-directory: ./flutter-app
        run: flutter pub get

      - name: Generate code
        working-directory: ./flutter-app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        working-directory: ./flutter-app
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=API_BASE_URL=https://app.autotestlar.uz/api/v1/ \
            --dart-define=WS_BASE_URL=wss://app.autotestlar.uz/api/v1/ws

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apks-${{ github.run_number }}-${{ github.sha }}
          path: flutter-app/build/app/outputs/flutter-apk/*.apk